<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Wars Galaxy Network</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  @font-face { font-family: 'Inter'; font-style: normal; font-weight: 400; font-display: swap; src: url('/fonts/inter-latin-400-normal.woff2') format('woff2'); }
  @font-face { font-family: 'Inter'; font-style: normal; font-weight: 600; font-display: swap; src: url('/fonts/inter-latin-600-normal.woff2') format('woff2'); }
  @font-face { font-family: 'Inter'; font-style: normal; font-weight: 800; font-display: swap; src: url('/fonts/inter-latin-800-normal.woff2') format('woff2'); }
  @font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 400 800; font-display: swap; src: url('/fonts/jetbrains-mono-latin-wght-normal.woff2') format('woff2'); }
</style>
<script>
  (function(){
    var t = localStorage.getItem('theme');
    if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  })();
</script>
<style>
:root {
  --bg: #ffffff;
  --bg-panel: #ffffff;
  --bg-panel-hover: #f5f5f0;
  --border: #d4d4d0;
  --text: #1a1a1a;
  --text-sec: #555;
  --text-muted: #888;
  --input-bg: #e8e8e3;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --deep-core: #fbbf24; --core: #22d3ee; --colonies: #60a5fa; --inner-rim: #4ade80;
  --expansion: #2dd4bf; --mid-rim: #c084fc; --outer-rim: #fb923c;
  --wild-space: #94a3b8; --unknown: #f87171; --hutt-space: #a78bfa;
}
[data-theme="dark"] {
  --bg: #0a0a0f; --bg-panel: #0d0d14; --bg-panel-hover: #14141f;
  --border: #1e1e2e; --text: #e5e5e5; --text-sec: #999; --text-muted: #666; --input-bg: #14141f;
}
*, *::before, *::after { box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: var(--font-sans); margin: 0; overflow: hidden; }
.app { height: 100vh; display: flex; flex-direction: column; }
.header { padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.header h1 { font-size: 1rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text); margin: 0; }
.header .subtitle { font-size: 0.68rem; color: var(--text-muted); font-family: var(--font-mono); }
.main { flex: 1; display: grid; grid-template-columns: 1fr 300px; overflow: hidden; }
@media (max-width: 900px) { .main { grid-template-columns: 1fr; } .side-panel { max-height: 40vh; } }
.graph-panel { position: relative; overflow: hidden; background: var(--bg); }
.graph-panel svg { width: 100%; height: 100%; display: block; }
.side-panel { overflow-y: auto; border-left: 1px solid var(--border); background: var(--bg-panel); }
.panel { padding: 14px 18px; border-bottom: 1px solid var(--border); }
.panel-title { font-size: 0.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-sec); margin-bottom: 10px; }
.search-input { width: 100%; padding: 8px 12px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); font-family: var(--font-sans); font-size: 0.75rem; outline: none; border-radius: 0; }
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus { border-color: var(--text-muted); }
.route-btn { display: block; width: 100%; text-align: left; padding: 8px 12px; background: var(--input-bg); border: 1px solid var(--border); border-left: 4px solid var(--route-color, var(--border)); color: var(--text); font-family: var(--font-sans); font-size: 0.72rem; font-weight: 600; cursor: pointer; margin-bottom: 4px; transition: all 0.15s; }
.route-btn:hover { background: var(--bg-panel-hover); }
.route-btn.active { background: var(--bg-panel-hover); border-color: var(--route-color); }
.legend-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; cursor: pointer; font-size: 0.72rem; transition: opacity 0.2s; }
.legend-item.dimmed { opacity: 0.25; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.info-name { font-size: 1.1rem; font-weight: 800; margin-bottom: 4px; }
.info-region { display: inline-block; font-size: 0.6rem; font-weight: 600; padding: 2px 8px; border-radius: 2px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.info-sector { font-size: 0.65rem; color: var(--text-muted); margin-bottom: 6px; font-style: italic; }
.info-sig { font-size: 0.72rem; color: var(--text-sec); line-height: 1.5; margin-bottom: 10px; }
.info-stat { font-size: 0.65rem; color: var(--text-muted); margin-bottom: 3px; }
.info-stat span { color: var(--text); font-weight: 600; }
.info-hint { font-size: 0.7rem; color: var(--text-muted); font-style: italic; }
.info-path { margin-top: 8px; padding: 10px; background: var(--input-bg); border: 1px solid var(--border); font-family: var(--font-mono); font-size: 0.65rem; line-height: 1.8; color: var(--text-sec); }
.info-path .path-planet { color: var(--text); font-weight: 600; }
.info-path .path-arrow { color: var(--text-muted); margin: 0 2px; }
.tooltip { position: fixed; pointer-events: none; background: var(--text); color: var(--bg); font-size: 0.65rem; font-family: var(--font-mono); padding: 5px 10px; border-radius: 3px; opacity: 0; transition: opacity 0.12s; z-index: 100; border: 1px solid var(--border); white-space: nowrap; }
.theme-toggle { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; display: flex; align-items: center; transition: color 0.15s; }
.theme-toggle:hover { color: var(--text); }
.theme-toggle svg { width: 16px; height: 16px; }
.icon-sun { display: none; }
[data-theme="dark"] .icon-moon { display: none; }
[data-theme="dark"] .icon-sun { display: block; }
</style>
</head>

const ROUTES = {"Corellian Run":{"c":"#22d3ee","p":[779,741,1119,964,4527,2600,3356,3848]},"Corellian Trade Spine":{"c":"#4ade80","p":[741,4509,4529,4510,4511]},"Perlemian Trade Route":{"c":"#fbbf24","p":[779,533,1266,698,1935,2533,4518,454]},"Rimma Trade Route":{"c":"#f87171","p":[4528,4509,3932,2363,4510,4511,844]},"Hydian Way":{"c":"#c084fc","p":[779,533,3773,2817,1935,1704,905,454]},"Braxant Run":{"c":"#fb923c","p":[533,126,4526,4518,2566,377]},"Triellus Trade Route":{"c":"#60a5fa","p":[2622,4523,3848,4512,3356]},"Salin Corridor":{"c":"#2dd4bf","p":[779,4519,4520,1334,4178]},"Shipwrights' Trace":{"c":"#e879f9","p":[741,4509,2172,533,66]},"Daragon Trail":{"c":"#facc15","p":[779,2172,1280,3481,3810,4525]},"Kessel Run":{"c":"#a3e635","p":[2035,3482,4510,4513]},"Manda Merchant Route":{"c":"#f97316","p":[2405,790,2316,258,1459]}};
// ── Parse data ──────────────────────────────────────────────────
// S = [id, name, sector, regionIdx, col, row, degree]
const nodes = S.map((s, i) => ({
  idx: i, id: s[0], name: s[1], sector: s[2],
  region: REGIONS[s[3]], regionIdx: s[3],
  col: s[4], row: s[5], deg: s[6],
  color: REGION_COLORS[s[3]],
}));

// Galaxy layout: convert grid (A-U=1-21, rows 1-21) to polar galaxy disc
// Galaxy center = Coruscant area ~ L-9 = col 12, row 9.5
const GCX = 12, GCY = 9.5;
const container = document.getElementById('graph');
const W = container.clientWidth, H = container.clientHeight;
const GALAXY_R = Math.min(W, H) * 0.44; // galaxy disc radius in pixels

// Convert grid coords to angle + distance from center, then to pixel
// Use golden-angle offset per cell to spread systems in same cell
const cellIndex = {};
// Seeded random for reproducibility
let _seed = 42;
function srand() { _seed = (_seed * 16807 + 0) % 2147483647; return (_seed - 1) / 2147483646; }

nodes.forEach(n => {
  const dx = n.col - GCX;
  const dy = n.row - GCY;
  const gridAngle = Math.atan2(dy, dx);
  const gridDist = Math.sqrt(dx*dx + dy*dy);

  // Normalize distance: max grid distance is ~14, map to 0-1
  const normDist = Math.min(gridDist / 13, 1.0);

  // Per-cell spread using golden angle
  const key = `${n.col},${n.row}`;
  cellIndex[key] = (cellIndex[key] || 0);
  const idx = cellIndex[key]++;

  // Golden angle spread within cell (2.399 radians)
  const cellAngleOffset = idx * 2.399;
  // Spiral outward within cell
  const cellRadOffset = Math.sqrt(idx) * GALAXY_R * 0.018;

  // Final polar position
  const finalAngle = gridAngle + cellAngleOffset * 0.15;
  const finalDist = normDist * GALAXY_R + cellRadOffset + (srand()-0.5) * GALAXY_R * 0.02;

  n.x = W/2 + Math.cos(finalAngle) * finalDist;
  n.y = H/2 + Math.sin(finalAngle) * finalDist;
});

// Size by degree
const maxDeg = Math.max(...nodes.map(n => n.deg));
function nodeRadius(deg) {
  return 0.8 + Math.sqrt(deg / maxDeg) * 2.8;
}

// Build adjacency
const adjacency = new Map();
nodes.forEach(n => adjacency.set(n.idx, []));
E.forEach(([a, b]) => {
  adjacency.get(a).push(b);
  adjacency.get(b).push(a);
});

// Edge route membership
function ek(a, b) { return a < b ? a + '|' + b : b + '|' + a; }
const edgeRouteMap = {};
Object.entries(ROUTES).forEach(([name, r]) => {
  for (let i = 0; i < r.p.length - 1; i++) {
    const key = ek(r.p[i], r.p[i+1]);
    if (!edgeRouteMap[key]) edgeRouteMap[key] = [];
    edgeRouteMap[key].push(name);
  }
});

// ── Theme ───────────────────────────────────────────────────────
const themeColors = {
  light: { bg: '#f8f8f5', edge: 'rgba(180,180,170,0.15)', edgeRoute: 'rgba(140,140,130,0.3)', label: '#555', glow: 'rgba(200,190,160,0.12)' },
  dark: { bg: '#0a0a0f', edge: 'rgba(60,60,100,0.35)', edgeRoute: 'rgba(80,80,120,0.5)', label: '#aaa', glow: 'rgba(40,30,80,0.4)' }
};
function isDark() { return document.documentElement.getAttribute('data-theme') === 'dark'; }
function T() { return themeColors[isDark() ? 'dark' : 'light']; }

// ── Canvas Setup ────────────────────────────────────────────────
const canvas = document.createElement('canvas');
canvas.width = W * 2; canvas.height = H * 2;
canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
container.appendChild(canvas);
const ctx = canvas.getContext('2d');
ctx.scale(2, 2); // retina

// ── Transform (pan/zoom) ────────────────────────────────────────
let transform = { x: 0, y: 0, k: 1 };
function toScreen(px, py) {
  return { x: px * transform.k + transform.x, y: py * transform.k + transform.y };
}
function toWorld(sx, sy) {
  return { x: (sx - transform.x) / transform.k, y: (sy - transform.y) / transform.k };
}

// ── State ───────────────────────────────────────────────────────
let selectedA = null, selectedB = null;
let hoveredNode = null;
let activeRoute = null;
let searchMatches = null;
let hiddenRegions = new Set();
let pathResult = null;

// ── Render ──────────────────────────────────────────────────────
function render() {
  const t = T();
  ctx.save();
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = t.bg;
  ctx.fillRect(0, 0, W, H);

  // Galaxy center glow
  const gc = toScreen(W/2, H/2);
  const glowR = GALAXY_R * 0.5 * transform.k;
  const grad = ctx.createRadialGradient(gc.x, gc.y, 0, gc.x, gc.y, glowR);
  grad.addColorStop(0, isDark() ? 'rgba(60,40,120,0.5)' : 'rgba(220,200,160,0.15)');
  grad.addColorStop(0.5, isDark() ? 'rgba(30,20,70,0.25)' : 'rgba(230,220,190,0.06)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars (dark mode only)
  if (isDark()) {
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    for (let i = 0; i < 600; i++) {
      const sx = (Math.sin(i*127.1)*0.5+0.5) * W;
      const sy = (Math.cos(i*311.7)*0.5+0.5) * H;
      ctx.beginPath();
      ctx.arc(sx, sy, 0.4 + (i%3)*0.3, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Region rings (subtle concentric circles like the galaxy image)
  const regionRingRadii = [0.06, 0.14, 0.22, 0.30, 0.38, 0.46, 0.60, 0.78, 0.92];
  const regionRingColors = REGION_COLORS;
  ctx.lineWidth = 0.5 / transform.k;
  ctx.setLineDash([3/transform.k, 6/transform.k]);
  regionRingRadii.forEach((frac, i) => {
    const sc = toScreen(W/2, H/2);
    ctx.strokeStyle = (regionRingColors[i] || '#888') + (isDark() ? '30' : '18');
    ctx.beginPath();
    ctx.arc(sc.x, sc.y, frac * GALAXY_R * transform.k, 0, Math.PI*2);
    ctx.stroke();
  });
  ctx.setLineDash([]);

  // Determine highlight state
  const highlightSet = new Set();
  const highlightEdges = new Set();
  const dimAll = selectedA || activeRoute || searchMatches || pathResult;

  if (pathResult) {
    pathResult.forEach(i => highlightSet.add(i));
    for (let i = 0; i < pathResult.length - 1; i++) {
      highlightEdges.add(ek(pathResult[i], pathResult[i+1]));
    }
  } else if (selectedA !== null) {
    highlightSet.add(selectedA);
    (adjacency.get(selectedA) || []).forEach(i => highlightSet.add(i));
  } else if (activeRoute) {
    const r = ROUTES[activeRoute];
    if (r) r.p.forEach(i => highlightSet.add(i));
  } else if (searchMatches) {
    searchMatches.forEach(i => highlightSet.add(i));
  }

  // ── Draw edges ──────────────────────────────────────────────
  E.forEach(([a, b, isRoute]) => {
    const na = nodes[a], nb = nodes[b];
    if (hiddenRegions.has(na.regionIdx) && hiddenRegions.has(nb.regionIdx)) return;

    const sa = toScreen(na.x, na.y);
    const sb = toScreen(nb.x, nb.y);

    // Cull offscreen
    if (sa.x < -50 && sb.x < -50) return;
    if (sa.x > W+50 && sb.x > W+50) return;
    if (sa.y < -50 && sb.y < -50) return;
    if (sa.y > H+50 && sb.y > H+50) return;

    const edgeKey = ek(a, b);
    let alpha = isRoute ? 0.3 : 0.1;
    let width = isRoute ? 0.8 : 0.4;
    let color = isRoute ? t.edgeRoute : t.edge;

    if (dimAll) {
      if (pathResult && highlightEdges.has(edgeKey)) {
        // Find route color if any
        const routeNames = edgeRouteMap[edgeKey];
        color = routeNames ? ROUTES[routeNames[0]]?.c || '#fff' : (isDark() ? '#fff' : '#111');
        alpha = 0.9; width = 2.5;
      } else if (activeRoute && (edgeRouteMap[edgeKey] || []).includes(activeRoute)) {
        color = ROUTES[activeRoute].c;
        alpha = 0.8; width = 2;
      } else if (!pathResult && !activeRoute && highlightSet.has(a) && highlightSet.has(b) && selectedA !== null) {
        const sid = selectedA;
        if (a === sid || b === sid) { alpha = 0.5; width = 1; }
        else { alpha = 0.03; width = 0.3; }
      } else {
        alpha = 0.03; width = 0.3;
      }
    }

    ctx.beginPath();
    ctx.moveTo(sa.x, sa.y);
    ctx.lineTo(sb.x, sb.y);
    ctx.strokeStyle = color;
    ctx.globalAlpha = alpha;
    ctx.lineWidth = width;
    ctx.stroke();
    ctx.globalAlpha = 1;
  });

  // ── Draw nodes ──────────────────────────────────────────────
  nodes.forEach((n, i) => {
    if (hiddenRegions.has(n.regionIdx)) return;

    const s = toScreen(n.x, n.y);
    if (s.x < -20 || s.x > W+20 || s.y < -20 || s.y > H+20) return;

    const r = nodeRadius(n.deg) * Math.min(Math.max(transform.k * 0.5, 0.6), 4);
    let alpha = 1;

    if (dimAll && !highlightSet.has(i)) {
      alpha = 0.08;
    }

    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(s.x, s.y, r, 0, Math.PI*2);
    ctx.fillStyle = n.color;
    ctx.fill();

    // Glow for selected/hovered only (too expensive for all high-degree at this scale)
    if ((i === selectedA || i === hoveredNode) && alpha > 0.5) {
      ctx.beginPath();
      ctx.arc(s.x, s.y, r * 3, 0, Math.PI*2);
      const g = ctx.createRadialGradient(s.x, s.y, r*0.5, s.x, s.y, r*3);
      g.addColorStop(0, n.color + '60');
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.fill();
    }

    // Selection ring
    if (i === selectedA || (pathResult && pathResult.includes(i))) {
      ctx.beginPath();
      ctx.arc(s.x, s.y, r + 2, 0, Math.PI*2);
      ctx.strokeStyle = isDark() ? '#ffd700' : '#b45309';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    ctx.globalAlpha = 1;
  });

  // ── Draw labels (sparse -- only very zoomed in) ────────────
  if (transform.k > 0.8) {
    const minDeg = transform.k > 4 ? 1 : transform.k > 2.5 ? 2 : transform.k > 1.5 ? 4 : 10;
    ctx.font = `${Math.max(6, 8/transform.k)}px Inter, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = t.label;

    nodes.forEach((n, i) => {
      if (hiddenRegions.has(n.regionIdx)) return;
      if (n.deg < minDeg && i !== hoveredNode && i !== selectedA) return;
      if (dimAll && !highlightSet.has(i)) return;

      const s = toScreen(n.x, n.y);
      if (s.x < -50 || s.x > W+50 || s.y < -50 || s.y > H+50) return;

      const r = nodeRadius(n.deg) * Math.min(Math.max(transform.k * 0.5, 0.6), 4);
      ctx.fillText(n.name, s.x, s.y + r + 10);
    });
  }

  // Hovered label always shown
  if (hoveredNode !== null) {
    const n = nodes[hoveredNode];
    const s = toScreen(n.x, n.y);
    ctx.font = 'bold 10px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = isDark() ? '#fff' : '#111';
    const r = nodeRadius(n.deg) * Math.min(Math.max(transform.k * 0.5, 0.6), 4);
    ctx.fillText(n.name, s.x, s.y + r + 12);
  }

  ctx.restore();
}

// ── Hit testing ─────────────────────────────────────────────────
function hitTest(sx, sy) {
  const w = toWorld(sx, sy);
  let best = null, bestDist = Infinity;
  nodes.forEach((n, i) => {
    if (hiddenRegions.has(n.regionIdx)) return;
    const dx = n.x - w.x, dy = n.y - w.y;
    const d = dx*dx + dy*dy;
    const r = Math.max(nodeRadius(n.deg) * 3, 6) / transform.k;
    if (d < r*r && d < bestDist) {
      bestDist = d;
      best = i;
    }
  });
  return best;
}

// ── BFS Pathfinding ─────────────────────────────────────────────
function findPath(startIdx, endIdx) {
  const queue = [[startIdx]];
  const visited = new Set([startIdx]);
  while (queue.length) {
    const path = queue.shift();
    const cur = path[path.length - 1];
    if (cur === endIdx) return path;
    for (const nb of (adjacency.get(cur) || [])) {
      if (!visited.has(nb)) {
        visited.add(nb);
        queue.push([...path, nb]);
      }
    }
  }
  return null;
}

// ── Mouse events ────────────────────────────────────────────────
let isDragging = false, dragStart = null;

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;

  if (isDragging && dragStart) {
    transform.x += sx - dragStart.x;
    transform.y += sy - dragStart.y;
    dragStart = { x: sx, y: sy };
    render();
    return;
  }

  const hit = hitTest(sx, sy);
  if (hit !== hoveredNode) {
    hoveredNode = hit;
    canvas.style.cursor = hit !== null ? 'pointer' : 'grab';

    // Tooltip
    const tooltip = document.getElementById('tooltip');
    if (hit !== null) {
      const n = nodes[hit];
      tooltip.style.display = 'block';
      tooltip.style.opacity = 1;
      tooltip.style.left = (e.pageX + 12) + 'px';
      tooltip.style.top = (e.pageY - 10) + 'px';
      tooltip.innerHTML = `${n.name} &middot; ${n.region} &middot; ${n.deg} links`;
    } else {
      tooltip.style.opacity = 0;
      tooltip.style.display = 'none';
    }
    render();
  } else if (hit !== null) {
    const tooltip = document.getElementById('tooltip');
    tooltip.style.left = (e.pageX + 12) + 'px';
    tooltip.style.top = (e.pageY - 10) + 'px';
  }
});

canvas.addEventListener('mousedown', (e) => {
  isDragging = true;
  const rect = canvas.getBoundingClientRect();
  dragStart = { x: e.clientX - rect.left, y: e.clientY - rect.top };
  canvas.style.cursor = 'grabbing';
});

canvas.addEventListener('mouseup', (e) => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  const moved = dragStart && (Math.abs(sx - dragStart.x) + Math.abs(sy - dragStart.y)) > 5;

  if (!moved) {
    // Click
    const hit = hitTest(sx, sy);
    handleClick(hit);
  }

  isDragging = false;
  dragStart = null;
  canvas.style.cursor = hoveredNode !== null ? 'pointer' : 'grab';
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.25 : 0.8;
  const newK = Math.max(0.2, Math.min(150, transform.k * factor));
  const ratio = newK / transform.k;
  transform.x = sx - ratio * (sx - transform.x);
  transform.y = sy - ratio * (sy - transform.y);
  transform.k = newK;
  render();
}, { passive: false });

// ── Click handler ───────────────────────────────────────────────
function handleClick(hit) {
  if (activeRoute) {
    activeRoute = null;
    document.querySelectorAll('.route-btn').forEach(b => b.classList.remove('active'));
  }
  searchMatches = null;

  if (hit === null) {
    // Click background: clear
    selectedA = null; selectedB = null; pathResult = null;
    clearSelection();
    render();
    return;
  }

  if (selectedA === null) {
    selectedA = hit; selectedB = null; pathResult = null;
    showPlanetInfo(nodes[hit]);
    render();
  } else if (selectedA === hit) {
    selectedA = null; selectedB = null; pathResult = null;
    clearSelection();
    render();
  } else {
    // Pathfind
    selectedB = hit;
    pathResult = findPath(selectedA, hit);
    if (pathResult) showPathInfo(pathResult);
    render();
  }
}

// ── Info panel ──────────────────────────────────────────────────
function showPlanetInfo(n) {
  const routes = [];
  Object.entries(ROUTES).forEach(([name, r]) => {
    if (r.p.includes(n.idx)) routes.push(name);
  });
  const neighbors = (adjacency.get(n.idx) || []).slice(0, 10).map(i => nodes[i].name);

  document.getElementById('info-content').innerHTML = `
    <div class="info-name">${n.name}</div>
    <div class="info-region" style="background:${n.color}22;color:${n.color}">${n.region}</div>
    <div class="info-sector">${n.sector} sector &middot; Grid ${n.grid || n.col+'-'+n.row}</div>
    <div class="info-stat">Connections: <span>${n.deg}</span></div>
    <div class="info-stat">Routes: <span>${routes.length ? routes.join(', ') : 'None'}</span></div>
    <div class="info-stat">Neighbors: <span>${neighbors.join(', ')}${neighbors.length >= 10 ? '...' : ''}</span></div>
    <div class="info-hint" style="margin-top:10px">Click another system to find route</div>
  `;
}

function showPathInfo(pathIdxs) {
  const names = pathIdxs.map(i => nodes[i].name);
  const pathHtml = names.map(n => `<span class="path-planet">${n}</span>`).join(' <span class="path-arrow">&rarr;</span> ');

  const routesUsed = new Set();
  for (let i = 0; i < pathIdxs.length - 1; i++) {
    const key = ek(pathIdxs[i], pathIdxs[i+1]);
    (edgeRouteMap[key] || []).forEach(r => routesUsed.add(r));
  }

  document.getElementById('info-content').innerHTML = `
    <div class="info-name">${names[0]} &rarr; ${names[names.length-1]}</div>
    <div class="info-stat">${pathIdxs.length - 1} hyperspace jump${pathIdxs.length - 1 !== 1 ? 's' : ''}</div>
    ${routesUsed.size ? `<div class="info-stat">Via: <span>${[...routesUsed].join(', ')}</span></div>` : ''}
    <div class="info-path">${pathHtml}</div>
    <div class="info-hint" style="margin-top:10px">Click background to clear</div>
  `;
}

function clearSelection() {
  document.getElementById('info-content').innerHTML = '<div class="info-hint">Click a system to explore</div>';
}

// ── Route buttons ───────────────────────────────────────────────
Object.entries(ROUTES).forEach(([name, r]) => {
  const btn = document.createElement('button');
  btn.className = 'route-btn';
  btn.style.setProperty('--route-color', r.c);
  btn.textContent = name;
  btn.addEventListener('click', () => {
    selectedA = null; selectedB = null; pathResult = null; searchMatches = null;

    if (activeRoute === name) {
      activeRoute = null;
      btn.classList.remove('active');
      clearSelection();
      render();
      return;
    }
    document.querySelectorAll('.route-btn').forEach(b => b.classList.remove('active'));
    activeRoute = name;
    btn.classList.add('active');

    document.getElementById('info-content').innerHTML = `
      <div class="info-name">${name}</div>
      <div class="info-stat">${r.p.length} systems, ${r.p.length - 1} jumps</div>
      <div class="info-path">${r.p.map(i => `<span class="path-planet">${nodes[i].name}</span>`).join(' <span class="path-arrow">&rarr;</span> ')}</div>
    `;
    render();
  });
  document.getElementById('route-buttons').appendChild(btn);
});

// ── Legend ───────────────────────────────────────────────────────
REGIONS.forEach((region, ri) => {
  const count = nodes.filter(n => n.regionIdx === ri).length;
  if (count === 0) return;
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${REGION_COLORS[ri]}"></span><span>${region} (${count})</span>`;
  item.addEventListener('click', () => {
    if (hiddenRegions.has(ri)) { hiddenRegions.delete(ri); item.classList.remove('dimmed'); }
    else { hiddenRegions.add(ri); item.classList.add('dimmed'); }
    render();
  });
  document.getElementById('legend').appendChild(item);
});

// ── Search ──────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', (e) => {
  const q = e.target.value.trim().toLowerCase();
  activeRoute = null; selectedA = null; selectedB = null; pathResult = null;
  document.querySelectorAll('.route-btn').forEach(b => b.classList.remove('active'));
  clearSelection();

  if (!q) { searchMatches = null; render(); return; }

  searchMatches = new Set();
  nodes.forEach((n, i) => {
    if (n.name.toLowerCase().includes(q) || n.region.toLowerCase().includes(q) || n.sector.toLowerCase().includes(q)) {
      searchMatches.add(i);
    }
  });
  render();
});

// ── Theme toggle ────────────────────────────────────────────────
document.getElementById('theme-toggle').addEventListener('click', () => {
  const next = isDark() ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  render();
});

// ── Subtitle ────────────────────────────────────────────────────
document.getElementById('subtitle').textContent = `${nodes.length} systems \u00b7 ${E.length} lanes \u00b7 ${Object.keys(ROUTES).length} trade routes`;

// ── Initial render ──────────────────────────────────────────────
render();
  </script>
</body>
