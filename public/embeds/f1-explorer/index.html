<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      @font-face { font-family: 'Inter'; font-style: normal; font-weight: 400; font-display: swap; src: url('/fonts/inter-latin-400-normal.woff2') format('woff2'); }
      @font-face { font-family: 'Inter'; font-style: normal; font-weight: 600; font-display: swap; src: url('/fonts/inter-latin-600-normal.woff2') format('woff2'); }
      @font-face { font-family: 'Inter'; font-style: normal; font-weight: 800; font-display: swap; src: url('/fonts/inter-latin-800-normal.woff2') format('woff2'); }
      @font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 400 800; font-display: swap; src: url('/fonts/jetbrains-mono-latin-wght-normal.woff2') format('woff2'); }
    </style>
    <script>
      (function(){
        var t = localStorage.getItem('theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      })();
    </script>
    <script type="module" crossorigin src="./assets/index-CM-t89xv.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CZ39bz5B.css">
    <style>
      #theme-toggle-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-muted, #888);
        padding: 4px;
        display: flex;
        align-items: center;
        transition: color 0.15s;
      }
      #theme-toggle-btn:hover { color: var(--text-primary, #1a1a1a); }
      #theme-toggle-btn svg { width: 16px; height: 16px; }
      [data-theme="dark"] .icon-moon { display: none; }
      .icon-sun { display: none; }
      [data-theme="dark"] .icon-sun { display: block; }

      [data-theme="dark"] {
        --bg-primary: #0a0a0f !important;
        --bg-secondary: #0d0d14 !important;
        --bg-card: #0d0d14 !important;
        --bg-card-hover: #14141f !important;
        --border: #1e1e2e !important;
        --border-light: #2a2a3a !important;
        --text-primary: #e5e5e5 !important;
        --text-secondary: #999 !important;
        --text-muted: #666 !important;
        --accent-red: #e5e5e5 !important;
        --chart-grid: #1e1e2e !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <button id="theme-toggle-btn" aria-label="Toggle theme">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
    <script>
      document.getElementById('theme-toggle-btn').addEventListener('click', function() {
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        var next = isDark ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });
      // Move toggle into React-rendered header once it mounts
      var observer = new MutationObserver(function() {
        var header = document.querySelector('.header');
        var btn = document.getElementById('theme-toggle-btn');
        if (header && btn) {
          header.appendChild(btn);
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true, subtree: true });
    </script>
  </body>
