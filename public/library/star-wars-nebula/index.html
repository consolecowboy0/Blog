<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Wars Galaxy Network</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  @font-face { font-family: 'Inter'; font-style: normal; font-weight: 400; font-display: swap; src: url('/fonts/inter-latin-400-normal.woff2') format('woff2'); }
  @font-face { font-family: 'Inter'; font-style: normal; font-weight: 600; font-display: swap; src: url('/fonts/inter-latin-600-normal.woff2') format('woff2'); }
  @font-face { font-family: 'Inter'; font-style: normal; font-weight: 800; font-display: swap; src: url('/fonts/inter-latin-800-normal.woff2') format('woff2'); }
  @font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 400 800; font-display: swap; src: url('/fonts/jetbrains-mono-latin-wght-normal.woff2') format('woff2'); }
</style>
<script>
  (function(){
    var t = localStorage.getItem('theme');
    if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  })();
</script>
<style>
:root {
  --bg: #ffffff;
  --bg-panel: #ffffff;
  --bg-panel-hover: #f5f5f0;
  --border: #d4d4d0;
  --text: #1a1a1a;
  --text-sec: #555;
  --text-muted: #888;
  --input-bg: #e8e8e3;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --deep-core: #fbbf24; --core: #22d3ee; --colonies: #60a5fa; --inner-rim: #4ade80;
  --expansion: #2dd4bf; --mid-rim: #c084fc; --outer-rim: #fb923c;
  --wild-space: #94a3b8; --unknown: #f87171; --hutt-space: #a78bfa;
}
[data-theme="dark"] {
  --bg: #0a0a0f; --bg-panel: #0d0d14; --bg-panel-hover: #14141f;
  --border: #1e1e2e; --text: #e5e5e5; --text-sec: #999; --text-muted: #666; --input-bg: #14141f;
}
*, *::before, *::after { box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: var(--font-sans); margin: 0; overflow: hidden; }
.app { height: 100vh; display: flex; flex-direction: column; }
.header { padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.header h1 { font-size: 1rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text); margin: 0; }
.header .subtitle { font-size: 0.68rem; color: var(--text-muted); font-family: var(--font-mono); }
.main { flex: 1; display: grid; grid-template-columns: 1fr 300px; overflow: hidden; }
@media (max-width: 900px) { .main { grid-template-columns: 1fr; } .side-panel { max-height: 40vh; } }
.graph-panel { position: relative; overflow: hidden; background: var(--bg); }
.graph-panel svg { width: 100%; height: 100%; display: block; }
.side-panel { overflow-y: auto; border-left: 1px solid var(--border); background: var(--bg-panel); }
.panel { padding: 14px 18px; border-bottom: 1px solid var(--border); }
.panel-title { font-size: 0.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-sec); margin-bottom: 10px; }
.search-input { width: 100%; padding: 8px 12px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); font-family: var(--font-sans); font-size: 0.75rem; outline: none; border-radius: 0; }
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus { border-color: var(--text-muted); }
.route-btn { display: block; width: 100%; text-align: left; padding: 8px 12px; background: var(--input-bg); border: 1px solid var(--border); border-left: 4px solid var(--route-color, var(--border)); color: var(--text); font-family: var(--font-sans); font-size: 0.72rem; font-weight: 600; cursor: pointer; margin-bottom: 4px; transition: all 0.15s; }
.route-btn:hover { background: var(--bg-panel-hover); }
.route-btn.active { background: var(--bg-panel-hover); border-color: var(--route-color); }
.legend-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; cursor: pointer; font-size: 0.72rem; transition: opacity 0.2s; }
.legend-item.dimmed { opacity: 0.25; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.info-name { font-size: 1.1rem; font-weight: 800; margin-bottom: 4px; }
.info-region { display: inline-block; font-size: 0.6rem; font-weight: 600; padding: 2px 8px; border-radius: 2px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.info-sector { font-size: 0.65rem; color: var(--text-muted); margin-bottom: 6px; font-style: italic; }
.info-sig { font-size: 0.72rem; color: var(--text-sec); line-height: 1.5; margin-bottom: 10px; }
.info-stat { font-size: 0.65rem; color: var(--text-muted); margin-bottom: 3px; }
.info-stat span { color: var(--text); font-weight: 600; }
.info-hint { font-size: 0.7rem; color: var(--text-muted); font-style: italic; }
.info-path { margin-top: 8px; padding: 10px; background: var(--input-bg); border: 1px solid var(--border); font-family: var(--font-mono); font-size: 0.65rem; line-height: 1.8; color: var(--text-sec); }
.info-path .path-planet { color: var(--text); font-weight: 600; }
.info-path .path-arrow { color: var(--text-muted); margin: 0 2px; }
.tooltip { position: fixed; pointer-events: none; background: var(--text); color: var(--bg); font-size: 0.65rem; font-family: var(--font-mono); padding: 5px 10px; border-radius: 3px; opacity: 0; transition: opacity 0.12s; z-index: 100; border: 1px solid var(--border); white-space: nowrap; }
.theme-toggle { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; display: flex; align-items: center; transition: color 0.15s; }
.theme-toggle:hover { color: var(--text); }
.theme-toggle svg { width: 16px; height: 16px; }
.icon-sun { display: none; }
[data-theme="dark"] .icon-moon { display: none; }
[data-theme="dark"] .icon-sun { display: block; }
</style>
</head>

// ── Parse data ──────────────────────────────────────────────────
// S = [id, name, sector, regionIdx, col, row, degree]
const nodes = S.map((s, i) => ({

  region: REGIONS[s[3]], regionIdx: s[3],
  col: s[4], row: s[5], deg: s[6],
  color: REGION_COLORS[s[3]],
}));

// Grid -> pixel position. Grid: A-U (col 1-21), rows 1-21
// Galaxy center ~= L-9.5 = col 12, row 9.5
const GCX = 12, GCY = 10;
const container = document.getElementById('graph');
const W = container.clientWidth, H = container.clientHeight;
const SCALE = Math.min(W, H) / 24;

function gridToPixel(col, row) {
  return {
    x: W/2 + (col - GCX) * SCALE,
    y: H/2 + (row - GCY) * SCALE
  };
}

// Assign pixel positions with jitter for same-cell overlap
const cellCount = {};
nodes.forEach(n => {
  const key = `${n.col},${n.row}`;
  cellCount[key] = (cellCount[key] || 0);
  const jx = (cellCount[key] % 5 - 2) * SCALE * 0.12;
  const jy = (Math.floor(cellCount[key] / 5) - 1) * SCALE * 0.12;
  cellCount[key]++;
  const p = gridToPixel(n.col, n.row);
  n.x = p.x + jx + (Math.random()-0.5)*SCALE*0.08;
  n.y = p.y + jy + (Math.random()-0.5)*SCALE*0.08;
});

// Size by degree
const maxDeg = Math.max(...nodes.map(n => n.deg));
function nodeRadius(deg) {
  return 1.5 + Math.sqrt(deg / maxDeg) * 5;
}

// Build adjacency
const adjacency = new Map();
nodes.forEach(n => adjacency.set(n.idx, []));
E.forEach(([a, b]) => {
  adjacency.get(a).push(b);
  adjacency.get(b).push(a);
});

// Edge route membership
function ek(a, b) { return a < b ? a + '|' + b : b + '|' + a; }
const edgeRouteMap = {};
Object.entries(ROUTES).forEach(([name, r]) => {
  for (let i = 0; i < r.p.length - 1; i++) {
    const key = ek(r.p[i], r.p[i+1]);
    if (!edgeRouteMap[key]) edgeRouteMap[key] = [];
    edgeRouteMap[key].push(name);
  }

// ── Theme ───────────────────────────────────────────────────────
const themeColors = {
  light: { bg: '#f8f8f5', edge: 'rgba(180,180,170,0.15)', edgeRoute: 'rgba(140,140,130,0.3)', label: '#555', glow: 'rgba(200,190,160,0.12)' },

// ── Transform (pan/zoom) ────────────────────────────────────────
let transform = { x: 0, y: 0, k: 1 };
function toScreen(px, py) {
  return { x: px * transform.k + transform.x, y: py * transform.k + transform.y };
}
function toWorld(sx, sy) {
  return { x: (sx - transform.x) / transform.k, y: (sy - transform.y) / transform.k };
}

// ── Render ──────────────────────────────────────────────────────
function render() {
  const t = T();
  ctx.save();
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = t.bg;
  ctx.fillRect(0, 0, W, H);

  // Galaxy center glow
  const gc = toScreen(W/2, H/2);

  // Stars (dark mode only)

      ctx.beginPath();
      ctx.arc(sx, sy, 0.4 + (i%3)*0.3, 0, Math.PI*2);
      ctx.fill();

  // Grid rings (subtle)

  ctx.setLineDash([3/transform.k, 5/transform.k]);

    ctx.arc(sc.x, sc.y, r * SCALE * transform.k, 0, Math.PI*2);

  const highlightEdges = new Set();
  const dimAll = selectedA || activeRoute || searchMatches || pathResult;

  if (pathResult) {
    pathResult.forEach(i => highlightSet.add(i));
    for (let i = 0; i < pathResult.length - 1; i++) {

    }

  } else if (activeRoute) {
    const r = ROUTES[activeRoute];

    if (hiddenRegions.has(na.regionIdx) && hiddenRegions.has(nb.regionIdx)) return;

    const sa = toScreen(na.x, na.y);

    // Cull offscreen
    if (sa.x < -50 && sb.x < -50) return;
    if (sa.x > W+50 && sb.x > W+50) return;
    if (sa.y < -50 && sb.y < -50) return;

    if (dimAll) {

      } else if (!pathResult && !activeRoute && highlightSet.has(a) && highlightSet.has(b) && selectedA !== null) {

    const s = toScreen(n.x, n.y);
    if (s.x < -20 || s.x > W+20 || s.y < -20 || s.y > H+20) return;

      ctx.fillStyle = g;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(s.x, s.y, r + 2, 0, Math.PI*2);
      ctx.strokeStyle = isDark() ? '#ffd700' : '#b45309';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    ctx.globalAlpha = 1;
  });

  // ── Draw labels (only at sufficient zoom) ─────────────────
  if (transform.k > 0.6) {
    const minDeg = transform.k > 2 ? 2 : transform.k > 1.2 ? 5 : 8;
    ctx.font = `${Math.max(6, 8/transform.k)}px Inter, sans-serif`;
    ctx.textAlign = 'center';

      const s = toScreen(n.x, n.y);

      const r = nodeRadius(n.deg) * Math.min(transform.k * 0.7, 1.5);

    ctx.fillText(n.name, s.x, s.y + r + 12);
  }

// ── Hit testing ─────────────────────────────────────────────────
function hitTest(sx, sy) {

    const dx = n.x - w.x, dy = n.y - w.y;

    if (d < r*r && d < bestDist) {
      bestDist = d;
      best = i;
    }
  });
  return best;
}

    if (cur === endIdx) return path;
    for (const nb of (adjacency.get(cur) || [])) {
      if (!visited.has(nb)) {
        visited.add(nb);
        queue.push([...path, nb]);
      }
    }
  }
  return null;
}

// ── Mouse events ────────────────────────────────────────────────
let isDragging = false, dragStart = null;

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;

  if (isDragging && dragStart) {
    transform.x += sx - dragStart.x;
    transform.y += sy - dragStart.y;
    dragStart = { x: sx, y: sy };
    render();
    return;
  }

  const hit = hitTest(sx, sy);
  if (hit !== hoveredNode) {
    hoveredNode = hit;
    canvas.style.cursor = hit !== null ? 'pointer' : 'grab';

    // Tooltip
    const tooltip = document.getElementById('tooltip');
    if (hit !== null) {
      const n = nodes[hit];
      tooltip.style.display = 'block';
      tooltip.style.opacity = 1;
      tooltip.style.left = (e.pageX + 12) + 'px';
      tooltip.style.top = (e.pageY - 10) + 'px';
      tooltip.innerHTML = `${n.name} &middot; ${n.region} &middot; ${n.deg} links`;
    } else {
      tooltip.style.opacity = 0;
      tooltip.style.display = 'none';
    }
    render();
  } else if (hit !== null) {
    const tooltip = document.getElementById('tooltip');
    tooltip.style.left = (e.pageX + 12) + 'px';
    tooltip.style.top = (e.pageY - 10) + 'px';
  }
});

canvas.addEventListener('mousedown', (e) => {
  isDragging = true;
  const rect = canvas.getBoundingClientRect();
  dragStart = { x: e.clientX - rect.left, y: e.clientY - rect.top };
  canvas.style.cursor = 'grabbing';
});

canvas.addEventListener('mouseup', (e) => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  const moved = dragStart && (Math.abs(sx - dragStart.x) + Math.abs(sy - dragStart.y)) > 5;

  if (!moved) {
    // Click
    const hit = hitTest(sx, sy);
    handleClick(hit);
  }

  isDragging = false;
  dragStart = null;
  canvas.style.cursor = hoveredNode !== null ? 'pointer' : 'grab';
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.15 : 0.87;
  const newK = Math.max(0.2, Math.min(10, transform.k * factor));
  const ratio = newK / transform.k;
  transform.x = sx - ratio * (sx - transform.x);
  transform.y = sy - ratio * (sy - transform.y);
  transform.k = newK;
  render();
}, { passive: false });

// ── Click handler ───────────────────────────────────────────────
function handleClick(hit) {
  if (activeRoute) {
    activeRoute = null;
    document.querySelectorAll('.route-btn').forEach(b => b.classList.remove('active'));
  }
  searchMatches = null;

  if (hit === null) {
    // Click background: clear
    selectedA = null; selectedB = null; pathResult = null;
    clearSelection();
    render();
    return;
  }

  if (selectedA === null) {
    selectedA = hit; selectedB = null; pathResult = null;
    showPlanetInfo(nodes[hit]);
    render();
  } else if (selectedA === hit) {
    selectedA = null; selectedB = null; pathResult = null;
    clearSelection();
    render();
  } else {
    // Pathfind
    selectedB = hit;
    pathResult = findPath(selectedA, hit);
    if (pathResult) showPathInfo(pathResult);
    render();
  }
}

// ── Info panel ──────────────────────────────────────────────────
function showPlanetInfo(n) {
  const routes = [];
  Object.entries(ROUTES).forEach(([name, r]) => {
    if (r.p.includes(n.idx)) routes.push(name);
  });
  const neighbors = (adjacency.get(n.idx) || []).slice(0, 10).map(i => nodes[i].name);

  document.getElementById('info-content').innerHTML = `
    <div class="info-name">${n.name}</div>
    <div class="info-region" style="background:${n.color}22;color:${n.color}">${n.region}</div>
    <div class="info-sector">${n.sector} sector &middot; Grid ${n.grid || n.col+'-'+n.row}</div>
    <div class="info-stat">Connections: <span>${n.deg}</span></div>
    <div class="info-stat">Routes: <span>${routes.length ? routes.join(', ') : 'None'}</span></div>
    <div class="info-stat">Neighbors: <span>${neighbors.join(', ')}${neighbors.length >= 10 ? '...' : ''}</span></div>
    <div class="info-hint" style="margin-top:10px">Click another system to find route</div>
  `;
}

function showPathInfo(pathIdxs) {
  const names = pathIdxs.map(i => nodes[i].name);
  const pathHtml = names.map(n => `<span class="path-planet">${n}</span>`).join(' <span class="path-arrow">&rarr;</span> ');

  const routesUsed = new Set();
  for (let i = 0; i < pathIdxs.length - 1; i++) {
    const key = ek(pathIdxs[i], pathIdxs[i+1]);
    (edgeRouteMap[key] || []).forEach(r => routesUsed.add(r));
  }

  document.getElementById('info-content').innerHTML = `
    <div class="info-name">${names[0]} &rarr; ${names[names.length-1]}</div>
    <div class="info-stat">${pathIdxs.length - 1} hyperspace jump${pathIdxs.length - 1 !== 1 ? 's' : ''}</div>
    ${routesUsed.size ? `<div class="info-stat">Via: <span>${[...routesUsed].join(', ')}</span></div>` : ''}
    <div class="info-path">${pathHtml}</div>
    <div class="info-hint" style="margin-top:10px">Click background to clear</div>
  `;
}

function clearSelection() {
  document.getElementById('info-content').innerHTML = '<div class="info-hint">Click a system to explore</div>';
}

// ── Route buttons ───────────────────────────────────────────────
Object.entries(ROUTES).forEach(([name, r]) => {
  const btn = document.createElement('button');
  btn.className = 'route-btn';
  btn.style.setProperty('--route-color', r.c);
  btn.textContent = name;
  btn.addEventListener('click', () => {
    selectedA = null; selectedB = null; pathResult = null; searchMatches = null;

    if (activeRoute === name) {
      activeRoute = null;
      btn.classList.remove('active');
      clearSelection();
      render();
      return;
    }
    document.querySelectorAll('.route-btn').forEach(b => b.classList.remove('active'));
    activeRoute = name;
    btn.classList.add('active');

    document.getElementById('info-content').innerHTML = `
      <div class="info-name">${name}</div>
      <div class="info-stat">${r.p.length} systems, ${r.p.length - 1} jumps</div>
      <div class="info-path">${r.p.map(i => `<span class="path-planet">${nodes[i].name}</span>`).join(' <span class="path-arrow">&rarr;</span> ')}</div>
    `;
    render();
  });
  document.getElementById('route-buttons').appendChild(btn);
});

// ── Legend ───────────────────────────────────────────────────────
REGIONS.forEach((region, ri) => {
  const count = nodes.filter(n => n.regionIdx === ri).length;
  if (count === 0) return;
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${REGION_COLORS[ri]}"></span><span>${region} (${count})</span>`;
  item.addEventListener('click', () => {
    if (hiddenRegions.has(ri)) { hiddenRegions.delete(ri); item.classList.remove('dimmed'); }
    else { hiddenRegions.add(ri); item.classList.add('dimmed'); }
    render();
  });
  document.getElementById('legend').appendChild(item);
});

// ── Search ──────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', (e) => {
  const q = e.target.value.trim().toLowerCase();
  activeRoute = null; selectedA = null; selectedB = null; pathResult = null;
  document.querySelectorAll('.route-btn').forEach(b => b.classList.remove('active'));
  clearSelection();

  if (!q) { searchMatches = null; render(); return; }

  searchMatches = new Set();
  nodes.forEach((n, i) => {
    if (n.name.toLowerCase().includes(q) || n.region.toLowerCase().includes(q) || n.sector.toLowerCase().includes(q)) {
      searchMatches.add(i);
    }
  });
  render();
});

// ── Theme toggle ────────────────────────────────────────────────
document.getElementById('theme-toggle').addEventListener('click', () => {
  const next = isDark() ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  render();
});

// ── Subtitle ────────────────────────────────────────────────────
document.getElementById('subtitle').textContent = `${nodes.length} systems \u00b7 ${E.length} lanes \u00b7 ${Object.keys(ROUTES).length} trade routes`;

// ── Initial render ──────────────────────────────────────────────
render();
  </script>
</body>
</html>
