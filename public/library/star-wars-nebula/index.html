<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Wars Galaxy Network</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  @font-face { font-family: 'Inter'; font-style: normal; font-weight: 400; font-display: swap; src: url('/fonts/inter-latin-400-normal.woff2') format('woff2'); }
  @font-face { font-family: 'Inter'; font-style: normal; font-weight: 600; font-display: swap; src: url('/fonts/inter-latin-600-normal.woff2') format('woff2'); }
  @font-face { font-family: 'Inter'; font-style: normal; font-weight: 800; font-display: swap; src: url('/fonts/inter-latin-800-normal.woff2') format('woff2'); }
  @font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 400 800; font-display: swap; src: url('/fonts/jetbrains-mono-latin-wght-normal.woff2') format('woff2'); }
</style>
<script>
  (function(){
    var t = localStorage.getItem('theme');
    if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  })();
</script>
<style>
:root {
  --bg: #ffffff;
  --bg-panel: #ffffff;
  --bg-panel-hover: #f5f5f0;
  --border: #d4d4d0;
  --text: #1a1a1a;
  --text-sec: #555;
  --text-muted: #888;
  --input-bg: #e8e8e3;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

  --deep-core: #fbbf24;
  --core: #22d3ee;
  --colonies: #60a5fa;
  --inner-rim: #4ade80;
  --expansion: #2dd4bf;
  --mid-rim: #c084fc;
  --outer-rim: #fb923c;
  --unknown: #f87171;
}

[data-theme="dark"] {
  --bg: #111111;
  --bg-panel: #111111;
  --bg-panel-hover: #1a1a1a;
  --border: #2a2a2a;
  --text: #e5e5e5;
  --text-sec: #999;
  --text-muted: #666;
  --input-bg: #1a1a1a;
}

*, *::before, *::after {
  box-sizing: border-box;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  margin: 0;
  overflow: hidden;
}

.app {
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.header h1 {
  font-size: 1rem;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text);
  margin: 0;
}

.header .subtitle {
  font-size: 0.68rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

.main {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 280px;
  overflow: hidden;
}

@media (max-width: 900px) {
  .main {
    grid-template-columns: 1fr;
  }
  .side-panel {
    max-height: 40vh;
  }
}

.graph-panel {
  position: relative;
  overflow: hidden;
  background: var(--bg);
}

.graph-panel svg {
  width: 100%;
  height: 100%;
  display: block;
}

.side-panel {
  overflow-y: auto;
  border-left: 1px solid var(--border);
  background: var(--bg-panel);
}

.panel {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}

.panel-title {
  font-size: 0.6rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-sec);
  margin-bottom: 10px;
}

.search-input {
  width: 100%;
  padding: 8px 12px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 0.75rem;
  outline: none;
  border-radius: 0;
}

.search-input::placeholder {
  color: var(--text-muted);
}

.search-input:focus {
  border-color: var(--text-muted);
}

.route-btn {
  display: block;
  width: 100%;
  text-align: left;
  padding: 8px 12px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-left: 4px solid var(--route-color, var(--border));
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 0.72rem;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 4px;
  transition: all 0.15s;
}

.route-btn:hover {
  background: var(--bg-panel-hover);
}

.route-btn.active {
  background: var(--bg-panel-hover);
  border-color: var(--route-color);
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
  cursor: pointer;
  font-size: 0.72rem;
  transition: opacity 0.2s;
}

.legend-item.dimmed {
  opacity: 0.25;
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.info-name {
  font-size: 1.1rem;
  font-weight: 800;
  margin-bottom: 4px;
}

.info-region {
  display: inline-block;
  font-size: 0.6rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 2px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
}

.info-sig {
  font-size: 0.72rem;
  color: var(--text-sec);
  line-height: 1.5;
  margin-bottom: 10px;
}

.info-stat {
  font-size: 0.65rem;
  color: var(--text-muted);
  margin-bottom: 3px;
}

.info-stat span {
  color: var(--text);
  font-weight: 600;
}

.info-hint {
  font-size: 0.7rem;
  color: var(--text-muted);
  font-style: italic;
}

.info-path {
  margin-top: 8px;
  padding: 10px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 0.65rem;
  line-height: 1.8;
  color: var(--text-sec);
}

.info-path .path-planet {
  color: var(--text);
  font-weight: 600;
}

.info-path .path-arrow {
  color: var(--text-muted);
  margin: 0 2px;
}

.tooltip {
  position: fixed;
  pointer-events: none;
  background: var(--text);
  color: var(--bg);
  font-size: 0.65rem;
  font-family: var(--font-mono);
  padding: 5px 10px;
  border-radius: 3px;
  opacity: 0;
  transition: opacity 0.12s;
  z-index: 100;
  border: 1px solid var(--border);
  white-space: nowrap;
}

.theme-toggle {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  display: flex;
  align-items: center;
  transition: color 0.15s;
}
.theme-toggle:hover { color: var(--text); }
.theme-toggle svg { width: 16px; height: 16px; }
.icon-sun { display: none; }
[data-theme="dark"] .icon-moon { display: none; }
[data-theme="dark"] .icon-sun { display: block; }
</style>
</head>

        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>

        <div class="panel">
          <div class="panel-title">Galactic Regions</div>
          <div id="legend"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="tooltip" id="tooltip"></div>

  "Hydian Way": { color: "#c084fc", path: ["coruscant","brentaal","takodana","ord_mantell","bothawui","hoth","dantooine"] },
};

// Build edge list. Tag edges that belong to named routes.
const rawEdges = [];
const edgeRouteMap = {};
function ek(a, b) { return a < b ? a + "|" + b : b + "|" + a; }

// Add route edges
Object.entries(tradeRoutes).forEach(([name, route]) => {
  for (let i = 0; i < route.path.length - 1; i++) {
    const key = ek(route.path[i], route.path[i+1]);
    if (!edgeRouteMap[key]) {
      edgeRouteMap[key] = [];
      rawEdges.push({ source: route.path[i], target: route.path[i+1] });
    }
    edgeRouteMap[key].push(name);
  }
});

  ["mon_cala","crait"],["crait","hoth"],["dathomir","nal_hutta"],["ryloth","dathomir"],["balmorra","kuat"],
  ["exegol","byss"],["exegol","tython"],["ilum","csilla"],["ilum","ahch_to"],["commenor","alderaan"],
  ["hosnian_prime","chandrila"],["eriadu","geonosis"],["duro","fondor"],["ord_mantell","kashyyyk"],
  ["kamino","naboo"],["dagobah","scarif"],
  // New system connections
  ["nar_shaddaa","nal_hutta"],["nar_shaddaa","teth"],["nar_shaddaa","dathomir"],["nar_shaddaa","tatooine"],
  ["nevarro","lothal"],["nevarro","arvala_7"],["nevarro","mandalore"],["nevarro","corvus"],
  ["arvala_7","lothal"],["corvus","lothal"],["corvus","kashyyyk"],
  ["kijimi","takodana"],["kijimi","ord_mantell"],["kijimi","bothawui"],
  ["ajan_kloss","dqar"],["ajan_kloss","endor"],["ajan_kloss","crait"],
  ["pasaana","jedha"],["pasaana","jakku"],["pasaana","onderon"],
  ["cantonica","bespin"],["cantonica","crait"],["cantonica","endor"],
  ["dqar","takodana"],["dqar","hoth"],["dqar","ajan_kloss"],
  ["rishi","kamino"],["rishi","yavin"],["rishi","nal_hutta"],
  ["christophsis","felucia"],["christophsis","saleucami"],["christophsis","utapau"],
  ["lola_sayu","onderon"],["lola_sayu","felucia"],["lola_sayu","christophsis"],
  ["korriban","dathomir"],["korriban","nal_hutta"],["korriban","exegol"],["korriban","malachor"],
  ["malachor","mustafar"],["malachor","dagobah"],["malachor","jedha"],
  ["atollon","lothal"],["atollon","mandalore"],["atollon","kessel"],
  ["krownest","mandalore"],["krownest","mygeeto"],["krownest","csilla"],
  ["rodia","naboo"],["rodia","malastare"],["rodia","dagobah"],
  ["glee_anselm","kashyyyk"],["glee_anselm","bothawui"],["glee_anselm","takodana"],
  ["muunilinst","mygeeto"],["muunilinst","csilla"],["muunilinst","bonadan"],
  ["bonadan","csilla"],["bonadan","ilum"],["bonadan","dantooine"],
  ["rakata_prime","ahch_to"],["rakata_prime","exegol"],["rakata_prime","tython"],
  ["peridea","ahch_to"],["peridea","csilla"],["peridea","exegol"],
  ["coaxium","sullust"],["coaxium","scarif"],["coaxium","eriadu"],["coaxium","kessel"],
  ["wobani","jedha"],["wobani","scarif"],["wobani","onderon"],
  ["eadu","scarif"],["eadu","wobani"],["eadu","sullust"],["eadu","mustafar"]
];
extraEdges.forEach(([s, t]) => {
  const key = ek(s, t);
  if (!edgeRouteMap[key]) {
    edgeRouteMap[key] = [];
    rawEdges.push({ source: s, target: t });
  }
});
// ── Theme System ──────────────────────────────────────────────────

const themeColors = {
  light: {
    graphBg: '#f8f8f5', edgeDefault: '#c8c8c0', edgeRoute: '#a0a098',
    edgeDim: '#e0e0d8', labelColor: '#555', starOpacity: 0,
    glowCenter: '#e8e0d0', glowCenterOp: 0.12, glowMid: '#f0ece0', glowMidOp: 0.06,
    pathColor: '#1a1a1a', selectColor: '#b45309',
  },
  dark: {
    graphBg: '#111111', edgeDefault: '#2a2a2a', edgeRoute: '#3a3a3a',
    edgeDim: '#1a1a1a', labelColor: '#999', starOpacity: 1,
    glowCenter: '#1a1040', glowCenterOp: 0.4, glowMid: '#0f1525', glowMidOp: 0.2,
    pathColor: '#ffffff', selectColor: '#ffd700',
  }
};

function isDark() { return document.documentElement.getAttribute('data-theme') === 'dark'; }
function T() { return themeColors[isDark() ? 'dark' : 'light']; }

// ── 1. Setup & Graph Init ──────────────────────────────────────────

const degree = {};
rawEdges.forEach(e => {
  degree[e.source] = (degree[e.source] || 0) + 1;
  degree[e.target] = (degree[e.target] || 0) + 1;
});
const maxDeg = Math.max(...Object.values(degree));

const container = document.getElementById('graph');
const W = container.clientWidth;
const H = container.clientHeight;
const cx = W / 2, cy = H / 2;
const scale = Math.min(W, H) / 2 * 0.88;

const rScale = d3.scaleSqrt().domain([1, maxDeg]).range([4, 16]);

const nodes = planets.map(p => {
  const r = regionRadius[p.region] * scale;
  const a = p.angle * Math.PI / 180;
  return {
    ...p,
    deg: degree[p.id] || 0,
    x: cx + r * Math.cos(a) + (Math.random() - 0.5) * 15,
    y: cy + r * Math.sin(a) + (Math.random() - 0.5) * 15,
  };
});

const nodeMap = new Map(nodes.map(n => [n.id, n]));
const links = rawEdges.map(e => ({ source: e.source, target: e.target, routes: edgeRouteMap[ek(e.source, e.target)] || [] }));

const adjacency = {};
nodes.forEach(n => adjacency[n.id] = []);
rawEdges.forEach(e => {
  adjacency[e.source].push(e.target);
  adjacency[e.target].push(e.source);
});

// ── 2. SVG Creation ────────────────────────────────────────────────

const svg = d3.select('#graph').append('svg')
  .attr('viewBox', `0 0 ${W} ${H}`)
  .attr('preserveAspectRatio', 'xMidYMid meet')
  .style('width', '100%')
  .style('height', '100%');

const g = svg.append('g');

// Defs: glow filters
const defs = svg.append('defs');

const filterGlow = defs.append('filter').attr('id', 'glow');
filterGlow.append('feGaussianBlur').attr('stdDeviation', 2.5).attr('result', 'blur');
const feMergeGlow = filterGlow.append('feMerge');
feMergeGlow.append('feMergeNode').attr('in', 'blur');
feMergeGlow.append('feMergeNode').attr('in', 'SourceGraphic');

const filterGlowStrong = defs.append('filter').attr('id', 'glow-strong');
filterGlowStrong.append('feGaussianBlur').attr('stdDeviation', 4).attr('result', 'blur');
const feMergeStrong = filterGlowStrong.append('feMerge');
feMergeStrong.append('feMergeNode').attr('in', 'blur');
feMergeStrong.append('feMergeNode').attr('in', 'SourceGraphic');

// Radial gradient for galaxy center
const radGrad = defs.append('radialGradient').attr('id', 'galaxy-center');
const gradStop0 = radGrad.append('stop').attr('offset', '0%').attr('stop-color', T().glowCenter).attr('stop-opacity', T().glowCenterOp);
const gradStop1 = radGrad.append('stop').attr('offset', '50%').attr('stop-color', T().glowMid).attr('stop-opacity', T().glowMidOp);
radGrad.append('stop').attr('offset', '100%').attr('stop-color', 'transparent').attr('stop-opacity', 0);

// Background
const bgRect = g.append('rect').attr('width', W).attr('height', H).attr('fill', T().graphBg);
g.append('circle').attr('cx', cx).attr('cy', cy).attr('r', scale * 0.6).attr('fill', 'url(#galaxy-center)');

// Star field
const starGroup = g.append('g').attr('class', 'stars').attr('opacity', T().starOpacity);
for (let i = 0; i < 300; i++) {
  starGroup.append('circle')
    .attr('cx', Math.random() * W)
    .attr('cy', Math.random() * H)
    .attr('r', 0.3 + Math.random() * 0.7)
    .attr('fill', 'white')
    .attr('opacity', 0.1 + Math.random() * 0.4);
}

// ── 3. Draw Links and Nodes ───────────────────────────────────────

const linkGroup = g.append('g').attr('class', 'links');
let linkSel = linkGroup.selectAll('line')
  .data(links)
  .join('line')
  .attr('stroke', d => d.routes.length ? T().edgeRoute : T().edgeDefault)
  .attr('stroke-opacity', d => d.routes.length ? 0.6 : 0.5)
  .attr('stroke-width', 1);

const nodeGroup = g.append('g').attr('class', 'nodes');
let nodeSel = nodeGroup.selectAll('circle')
  .data(nodes)
  .join('circle')
  .attr('r', d => rScale(d.deg))
  .attr('fill', d => regionColors[d.region])
  .attr('stroke', d => regionColors[d.region])
  .attr('stroke-width', 0.5)
  .attr('filter', 'url(#glow)')
  .style('cursor', 'pointer');

const labelGroup = g.append('g').attr('class', 'labels');
let labelSel = labelGroup.selectAll('text')
  .data(nodes.filter(d => d.deg >= 5))
  .join('text')
  .text(d => d.name)
  .attr('font-size', '7px')
  .attr('fill', T().labelColor)
  .attr('text-anchor', 'middle')
  .attr('dy', d => rScale(d.deg) + 10)
  .attr('pointer-events', 'none')
  .attr('font-family', 'Inter, sans-serif')
  .attr('opacity', 0.7);

// ── 4. Force Simulation ───────────────────────────────────────────

const simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d => d.id).distance(70).strength(0.2))
  .force('charge', d3.forceManyBody().strength(-100))
  .force('radial', d3.forceRadial(d => regionRadius[d.region] * scale, cx, cy).strength(0.35))
  .force('collide', d3.forceCollide().radius(d => rScale(d.deg) + 3))
  .on('tick', ticked);

function ticked() {
  linkSel
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y);

  nodeSel
    .attr('cx', d => d.x)
    .attr('cy', d => d.y);

  labelSel
    .attr('x', d => d.x)
    .attr('y', d => d.y);
}

// ── 5. Zoom ───────────────────────────────────────────────────────

const zoom = d3.zoom().scaleExtent([0.3, 5]).on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

// ── 6. Tooltip ────────────────────────────────────────────────────

const tooltip = d3.select('#tooltip');

nodeSel.on('mouseenter', (event, d) => {
  tooltip
    .style('display', 'block')
    .style('left', (event.pageX + 12) + 'px')
    .style('top', (event.pageY - 10) + 'px')
    .html(`${d.name} &middot; ${d.region}`);
}).on('mousemove', (event) => {
  tooltip
    .style('left', (event.pageX + 12) + 'px')
    .style('top', (event.pageY - 10) + 'px');
}).on('mouseleave', () => {
  tooltip.style('display', 'none');
});

// ── 7. Drag ───────────────────────────────────────────────────────

const drag = d3.drag()
  .on('start', (event, d) => {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x;
    d.fy = d.y;
  })
  .on('drag', (event, d) => {
    d.fx = event.x;
    d.fy = event.y;
  })
  .on('end', (event, d) => {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null;
    d.fy = null;
  });

nodeSel.call(drag);

// ── 8. Node Click / Selection / Pathfinding ───────────────────────

let selectedA = null, selectedB = null;

function findPath(startId, endId) {
  const queue = [[startId]];
  const visited = new Set([startId]);
  while (queue.length) {
    const path = queue.shift();
    const cur = path[path.length - 1];
    if (cur === endId) return path;
    for (const nb of (adjacency[cur] || [])) {
      if (!visited.has(nb)) {
        visited.add(nb);
        queue.push([...path, nb]);
      }
    }
  }
  return null;
}

nodeSel.on('click', (event, d) => {
  event.stopPropagation();

  // Clear any active route
  if (activeRoute) {
    activeRoute = null;
    document.querySelectorAll('.route-btn').forEach(b => b.classList.remove('active'));
  }

  if (!selectedA) {
    // First selection
    selectedA = d;
    selectedB = null;

    const connectedIds = new Set(adjacency[d.id] || []);
    connectedIds.add(d.id);

    nodeSel.transition().duration(300)
      .attr('opacity', n => connectedIds.has(n.id) ? 1 : 0.1)
      .attr('stroke', n => n.id === d.id ? T().selectColor : regionColors[n.region])
      .attr('stroke-width', n => n.id === d.id ? 2 : 0.5);

    linkSel.transition().duration(300)
      .attr('stroke-opacity', l => {
        const sid = typeof l.source === 'object' ? l.source.id : l.source;
        const tid = typeof l.target === 'object' ? l.target.id : l.target;
        return (sid === d.id || tid === d.id) ? 0.7 : 0.05;
      });

    if (labelSel) labelSel.transition().duration(300)
      .attr('opacity', n => connectedIds.has(n.id) ? 0.8 : 0);

    showPlanetInfo(d);

  } else if (selectedA.id === d.id) {
    // Deselect
    selectedA = null;
    selectedB = null;
    restoreAll();
    clearSelection();

  } else {
    // Second selection -- pathfinding
    selectedB = d;
    const pathIds = findPath(selectedA.id, d.id);

    if (pathIds) {
      const pathSet = new Set(pathIds);
      const pathEdges = new Set();
      for (let i = 0; i < pathIds.length - 1; i++) {
        pathEdges.add(ek(pathIds[i], pathIds[i + 1]));
      }

      nodeSel.transition().duration(300)
        .attr('opacity', n => pathSet.has(n.id) ? 1 : 0.1)
        .attr('stroke', n => pathSet.has(n.id) ? T().selectColor : regionColors[n.region])
        .attr('stroke-width', n => pathSet.has(n.id) ? 2 : 0.5);

      linkSel.transition().duration(300)
        .attr('stroke', l => {
          const key = ek(
            typeof l.source === 'object' ? l.source.id : l.source,
            typeof l.target === 'object' ? l.target.id : l.target
          );
          return pathEdges.has(key) ? T().pathColor : T().edgeDim;
        })
        .attr('stroke-opacity', l => {
          const key = ek(
            typeof l.source === 'object' ? l.source.id : l.source,
            typeof l.target === 'object' ? l.target.id : l.target
          );
          return pathEdges.has(key) ? 0.9 : 0.05;
        })
        .attr('stroke-width', l => {
          const key = ek(
            typeof l.source === 'object' ? l.source.id : l.source,
            typeof l.target === 'object' ? l.target.id : l.target
          );
          return pathEdges.has(key) ? 2.5 : 1;
        });

      linkSel.attr('filter', l => {
        const key = ek(
          typeof l.source === 'object' ? l.source.id : l.source,
          typeof l.target === 'object' ? l.target.id : l.target
        );
        return pathEdges.has(key) ? 'url(#glow-strong)' : null;
      });

      if (labelSel) labelSel.transition().duration(300)
        .attr('opacity', n => pathSet.has(n.id) ? 0.8 : 0);

      showPathInfo(pathIds);
    }
  }
});

svg.on('click', () => {
  selectedA = null;
  selectedB = null;
  if (activeRoute) {
    activeRoute = null;
    document.querySelectorAll('.route-btn').forEach(b => b.classList.remove('active'));
  }
  restoreAll();
  clearSelection();
});

// ── 9. Info Panel Updates ─────────────────────────────────────────

function showPlanetInfo(planet) {
  const routes = [];
  Object.entries(tradeRoutes).forEach(([name, r]) => {
    if (r.path.includes(planet.id)) routes.push(name);
  });
  const connected = (adjacency[planet.id] || []).map(id => nodeMap.get(id)?.name).filter(Boolean);

  document.getElementById('info-content').innerHTML = `
    <div class="info-name">${planet.name}</div>
    <div class="info-region" style="background:${regionColors[planet.region]}22;color:${regionColors[planet.region]}">${planet.region}</div>
    <div class="info-sig">${planet.sig}</div>
    <div class="info-stat">Connections: <span>${planet.deg}</span></div>
    <div class="info-stat">Routes: <span>${routes.length ? routes.join(', ') : 'None'}</span></div>
    <div class="info-hint" style="margin-top:10px">Click another system to find route</div>
  `;
}

function showPathInfo(pathIds) {
  const names = pathIds.map(id => nodeMap.get(id)?.name || id);
  const start = names[0], end = names[names.length - 1];
  const pathHtml = names.map(n => `<span class="path-planet">${n}</span>`).join(' <span class="path-arrow">&rarr;</span> ');

  document.getElementById('info-content').innerHTML = `
    <div class="info-name">${start} &rarr; ${end}</div>
    <div class="info-stat">${pathIds.length - 1} hyperspace jump${pathIds.length - 1 !== 1 ? 's' : ''}</div>
    <div class="info-path">${pathHtml}</div>
    <div class="info-hint" style="margin-top:10px">Click background to clear</div>
  `;
}

function clearSelection() {
  document.getElementById('info-content').innerHTML = `
    <div class="info-hint">Click a system to explore</div>
  `;
}

// ── 10. Route Highlighting ────────────────────────────────────────

let activeRoute = null;

Object.entries(tradeRoutes).forEach(([name, route]) => {
  const btn = document.createElement('button');
  btn.className = 'route-btn';
  btn.style.setProperty('--route-color', route.color);
  btn.textContent = name;
  btn.addEventListener('click', () => {
    clearSelection();
    selectedA = null;
    selectedB = null;

    if (activeRoute === name) {
      activeRoute = null;
      btn.classList.remove('active');
      restoreAll();
      return;
    }
    document.querySelectorAll('.route-btn').forEach(b => b.classList.remove('active'));
    activeRoute = name;
    btn.classList.add('active');

    const routeSet = new Set(route.path);
    nodeSel.transition().duration(300).attr('opacity', d => routeSet.has(d.id) ? 1 : 0.08);
    linkSel.transition().duration(300)
      .attr('stroke', d => {
        const key = ek(
          typeof d.source === 'object' ? d.source.id : d.source,
          typeof d.target === 'object' ? d.target.id : d.target
        );
        return (edgeRouteMap[key] || []).includes(name) ? route.color : T().edgeDim;
      })
      .attr('stroke-opacity', d => {
        const key = ek(
          typeof d.source === 'object' ? d.source.id : d.source,
          typeof d.target === 'object' ? d.target.id : d.target
        );
        return (edgeRouteMap[key] || []).includes(name) ? 0.9 : 0.05;
      })
      .attr('stroke-width', d => {
        const key = ek(
          typeof d.source === 'object' ? d.source.id : d.source,
          typeof d.target === 'object' ? d.target.id : d.target
        );
        return (edgeRouteMap[key] || []).includes(name) ? 2.5 : 1;
      });
    if (labelSel) labelSel.transition().duration(300).attr('opacity', d => routeSet.has(d.id) ? 0.8 : 0);
  });
  document.getElementById('route-buttons').appendChild(btn);
});

// ── 11. Legend ─────────────────────────────────────────────────────

const hiddenRegions = new Set();

Object.entries(regionColors).forEach(([region, color]) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${color}"></span><span>${region}</span>`;
  item.addEventListener('click', () => {
    if (hiddenRegions.has(region)) {
      hiddenRegions.delete(region);
      item.classList.remove('dimmed');
    } else {
      hiddenRegions.add(region);
      item.classList.add('dimmed');
    }
    nodeSel.transition().duration(300).attr('opacity', d => hiddenRegions.has(d.region) ? 0.03 : 1);
    if (labelSel) labelSel.transition().duration(300).attr('opacity', d => hiddenRegions.has(d.region) ? 0 : (d.deg >= 5 ? 0.7 : 0));
  });
  document.getElementById('legend').appendChild(item);
});

// ── 12. Search ────────────────────────────────────────────────────

document.getElementById('search').addEventListener('input', (e) => {
  const query = e.target.value.trim().toLowerCase();

  // Clear active route and selection
  if (activeRoute) {
    activeRoute = null;
    document.querySelectorAll('.route-btn').forEach(b => b.classList.remove('active'));
  }
  selectedA = null;
  selectedB = null;
  clearSelection();

  if (!query) {
    restoreAll();
    return;
  }

  const matchIds = new Set(nodes.filter(n => n.name.toLowerCase().includes(query)).map(n => n.id));

  nodeSel.transition().duration(300)
    .attr('opacity', d => matchIds.has(d.id) ? 1 : 0.08)
    .attr('stroke', d => regionColors[d.region])
    .attr('stroke-width', 0.5);

  linkSel.transition().duration(300)
    .attr('stroke-opacity', 0.05)
    .attr('stroke', T().edgeDim)
    .attr('stroke-width', 1);

  if (labelSel) labelSel.transition().duration(300)
    .attr('opacity', d => matchIds.has(d.id) ? 0.9 : 0);
});

// ── 13. restoreAll ────────────────────────────────────────────────

function restoreAll() {
  nodeSel.transition().duration(300)
    .attr('opacity', d => hiddenRegions.has(d.region) ? 0.03 : 1)
    .attr('stroke', d => regionColors[d.region])
    .attr('stroke-width', 0.5);
  linkSel.transition().duration(300)
    .attr('stroke', d => {
      const key = ek(
        typeof d.source === 'object' ? d.source.id : d.source,
        typeof d.target === 'object' ? d.target.id : d.target
      );
      return (edgeRouteMap[key] || []).length ? T().edgeRoute : T().edgeDefault;
    })
    .attr('stroke-opacity', d => {
      const key = ek(
        typeof d.source === 'object' ? d.source.id : d.source,
        typeof d.target === 'object' ? d.target.id : d.target
      );
      return (edgeRouteMap[key] || []).length ? 0.6 : 0.5;
    })
    .attr('stroke-width', 1);
  linkSel.attr('filter', null);
  if (labelSel) labelSel.transition().duration(300)
    .attr('fill', T().labelColor)
    .attr('opacity', d => d.deg >= 5 ? 0.7 : 0);
}

// ── 14. Theme toggle ─────────────────────────────────────────────

function applyTheme() {
  const t = T();
  bgRect.transition().duration(400).attr('fill', t.graphBg);
  starGroup.transition().duration(400).attr('opacity', t.starOpacity);
  gradStop0.attr('stop-color', t.glowCenter).attr('stop-opacity', t.glowCenterOp);
  gradStop1.attr('stop-color', t.glowMid).attr('stop-opacity', t.glowMidOp);
  restoreAll();
}

document.getElementById('theme-toggle').addEventListener('click', () => {
  const next = isDark() ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  applyTheme();
});

// ── 15. Subtitle update & close ───────────────────────────────────

document.querySelector('.subtitle').textContent = `${nodes.length} systems \u00b7 ${links.length} lanes \u00b7 5 trade routes`;

</script>
